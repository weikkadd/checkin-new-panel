name: host2play 续期

on:
  schedule:
    - cron: '0 0,11,22 * * *'    # 触发点: 00:00, 11:00, 22:00 (UTC) = 北京 08:00, 19:00, 06:00
    - cron: '30 5,16 * * *'      # 触发点: 05:30, 16:30 (UTC) = 北京 13:30, 00:30
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  run-renew:
    name: 执行续期
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 拉取仓库
        uses: actions/checkout@v4

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg unzip curl jq
          wget -q -O /tmp/google-chrome-stable_current_amd64.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i /tmp/google-chrome-stable_current_amd64.deb || sudo apt-get install -f -y

      - name: 安装 Python 依赖
        working-directory: host2play-renew
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 启用 WARP 网络
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      - name: 修复 DNS
        run: |
          echo "[INFO] 停用 systemd-resolved，设置公共 DNS..."
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo systemctl disable systemd-resolved 2>/dev/null || true
          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8\nnameserver 1.0.0.1" | sudo tee /etc/resolv.conf
          sleep 2

      - name: 启动代理并执行续期
        env:
          H2P_RENEW_URL: ${{ secrets.H2P_RENEW_URL }}
          H2P_COOKIE: ${{ secrets.H2P_COOKIE }}
          H2P_ACCOUNTS: ${{ secrets.H2P_ACCOUNTS }}
          PROXY_URL: "socks5://127.0.0.1:1080"
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          NODE_LINK: ${{ secrets.NODE_LINK }}
        run: |
          if [ -n "$NODE_LINK" ]; then
            echo "🚀 正在安装并启动 sing-box..."
            # 获取最新版 sing-box
            latest_version=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r .tag_name | sed 's/v//')
            echo "最新版本: v$latest_version"
            curl -Lo sing-box.tar.gz "https://github.com/SagerNet/sing-box/releases/download/v${latest_version}/sing-box-${latest_version}-linux-amd64.tar.gz"
            tar -xzf sing-box.tar.gz
            cp sing-box-*/sing-box .
            chmod +x sing-box

            # 生成配置并启动 (假设 NODE_LINK 是订阅链接或节点链接，这里简化为 tuic 转换逻辑)
            # 注意：这里的转换逻辑取决于您的 NODE_LINK 格式，目前先按您之前的逻辑启动
            # 如果您有专门的转换脚本，请在这里调用
            
            # 临时启动逻辑 (示例，请确保您的 NODE_LINK 逻辑正确)
            # ./sing-box run -c config.json > sing-box.log 2>&1 &
            
            # 为了最稳妥，这里建议直接运行您之前成功的 sing-box 启动脚本内容
            # 假设您之前是通过脚本生成的 config.json
            # [这里插入您之前成功的 sing-box 启动代码块]
            
            # 这里我先放入通用的 sing-box 启动逻辑占位，请根据实际情况调整
            echo "代理启动中..."
          fi
          
          # 检查代理就绪
          echo "⏳ 等待代理就绪..."
          MAX_RETRIES=15
          for ((i=1; i<=MAX_RETRIES; i++)); do
            if curl -s --socks5 127.0.0.1:1080 https://api.ip.sb/ip > /dev/null; then
              echo "✅ 代理已就绪，出口 IP: $(curl -s --socks5 127.0.0.1:1080 https://api.ip.sb/ip)"
              break
            fi
            sleep 3
            [ $i -eq $MAX_RETRIES ] && echo "❌ 代理启动超时" && exit 1
          done
          
          echo "🚀 开始执行续期脚本..."
          cd host2play-renew
          mkdir -p output/screenshots
          python main.py

      - name: 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: host2play-screenshots-${{ github.run_number }}
          path: host2play-renew/output/screenshots/*.png
          retention-days: 7
          if-no-files-found: ignore

      - name: 上传日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: host2play-log-${{ github.run_number }}
          path: host2play-renew/renew.log
          retention-days: 7
          if-no-files-found: ignore

      - name: 清理历史运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
