name: host2play 续期

on:
  schedule:
    - cron: '0 0,11,22 * * *'    # 触发点: 00:00, 11:00, 22:00 (UTC) = 北京 08:00, 19:00, 06:00
    - cron: '30 5,16 * * *'      # 触发点: 05:30, 16:30 (UTC) = 北京 13:30, 00:30
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  run-renew:
    name: 执行续期
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 拉取仓库
        uses: actions/checkout@v4

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg unzip curl
          wget -q -O /tmp/google-chrome-stable_current_amd64.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i /tmp/google-chrome-stable_current_amd64.deb || sudo apt-get install -f -y

      - name: 安装 Python 依赖
        working-directory: host2play-renew
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 启用 WARP 网络
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      - name: 修复 DNS
        run: |
          echo "[INFO] 停用 systemd-resolved，设置公共 DNS..."
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo systemctl disable systemd-resolved 2>/dev/null || true

          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8\nnameserver 1.0.0.1" | sudo tee /etc/resolv.conf

          sleep 2

          echo "[INFO] DNS 测试:"
          nslookup host2play.gratis 1.1.1.1 || echo "[WARN] 解析失败"

          echo ""
          echo "[INFO] 当前出口 IP:"
          curl -s --max-time 10 https://api.ipify.org && echo
          echo "[INFO] WARP Trace:"
          curl -s --max-time 10 https://www.cloudflare.com/cdn-cgi/trace | grep -E 'ip=|warp=|loc=' || true

      - name: 配置 TUIC 代理桥接
        run: |
          echo "🚀 下载 tuic-client..."
          # 尝试多个可能的下载路径
          URLS=(
            "https://github.com/EAimTY/tuic/releases/download/tuic-client-1.0.0/tuic-client-1.0.0-x86_64-unknown-linux-gnu"
            "https://github.com/EAimTY/tuic/releases/download/1.0.0/tuic-client-1.0.0-x86_64-unknown-linux-gnu"
          )
          for url in "${URLS[@]}"; do
            echo "尝试下载: $url"
            curl -L "$url" -o tuic-client
            if file tuic-client | grep -q "ELF"; then
              echo "✅ 下载成功"
              break
            fi
          done
          
          if ! file tuic-client | grep -q "ELF"; then
            echo "❌ 所有下载链接均失效或文件损坏"
            exit 1
          fi
          
          chmod +x tuic-client
          
          echo "📝 生成 TUIC 配置..."
          cat <<EOF > tuic_config.json
          {
              "relay": {
                  "server": "185.156.53.135:26689",
                  "uuid": "abe6bc0c-e62c-4f1c-981f-7d790576c2fa",
                  "password": "eishare2025",
                  "congestion_control": "bbr",
                  "alpn": ["h3"],
                  "sni": "www.bing.com",
                  "allow_insecure": true,
                  "udp_relay_mode": "native"
              },
              "local": {
                  "server": "127.0.0.1:1080",
                  "protocol": "socks5"
              }
          }
          EOF
          
          echo "⚡ 启动 TUIC 客户端..."
          ./tuic-client -c tuic_config.json > tuic.log 2>&1 &
          
          echo "⏳ 等待代理启动并检查可用性..."
          MAX_RETRIES=10
          for ((i=1; i<=MAX_RETRIES; i++)); do
            if curl -s --socks5 127.0.0.1:1080 https://api.ip.sb/ip > /dev/null; then
              echo "✅ TUIC 代理已就绪"
              curl -s --socks5 127.0.0.1:1080 https://api.ip.sb/ip
              break
            fi
            echo "等待代理中 ($i/$MAX_RETRIES)..."
            sleep 3
            if [ $i -eq $MAX_RETRIES ]; then
              echo "❌ 代理启动超时，查看日志:"
              cat tuic.log
              exit 1
            fi
          done

      - name: 执行续期
        env:
          H2P_RENEW_URL: ${{ secrets.H2P_RENEW_URL }}
          H2P_COOKIE: ${{ secrets.H2P_COOKIE }}
          H2P_ACCOUNTS: ${{ secrets.H2P_ACCOUNTS }}
          PROXY_URL: "socks5://127.0.0.1:1080"
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        working-directory: host2play-renew
        run: |
          mkdir -p output/screenshots
          python main.py

      - name: 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: host2play-screenshots-${{ github.run_number }}
          path: host2play-renew/output/screenshots/*.png
          retention-days: 7
          if-no-files-found: ignore

      - name: 上传日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: host2play-log-${{ github.run_number }}
          path: host2play-renew/renew.log
          retention-days: 7
          if-no-files-found: ignore

      - name: 清理历史运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
