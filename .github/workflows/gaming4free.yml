name: Game4Free 自动续期
on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: write
      contents: read
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: 强制恢复 Python 文件（绕过 autocrlf）
        run: |
          cd gaming4free-renew
          COMMIT=$(git rev-parse HEAD)
          
          # 对每个文件：先检查，如果被压缩就从 git blob 恢复
          for f in renew.py config.py utils.py cooldown.py tg_notify.py; do
            if [ -f "$f" ]; then
              LC=$(wc -l < "$f")
              echo "$f: $LC lines"
              if [ "$LC" -lt 10 ]; then
                echo "  => RESTORING from git blob..."
                git show "$COMMIT:gaming4free-renew/$f" > "$f.new"
                # 强制 LF 换行
                sed 's/\r//g' "$f.new" > "$f.fixed"
                mv "$f.fixed" "$f"
                LC=$(wc -l < "$f")
                echo "  => Restored: $f has $LC lines"
                # 验证：检查是否包含关键代码
                if grep -q "def main" "$f"; then
                  echo "  => Verified: contains 'def main'"
                else
                  echo "  => ERROR: missing 'def main'!"
                fi
              fi
            fi
          done
          
          echo "=== Final state ==="
          ls -la *.py
          wc -l *.py
          head -3 renew.py

      - name: 配置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装 Chrome 浏览器
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: 安装系统依赖
        run: |
          sudo apt-get update -q
          sudo apt-get install -y xvfb xdotool wget \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 \
            libxcomposite1 libxrandr2 libgbm1 \
            libpango-1.0-0 libcairo2 fonts-liberation

      - name: 安装 Python 依赖
        working-directory: gaming4free-renew
        run: pip install seleniumbase

      - name: 配置代理 (sing-box)
        continue-on-error: true
        env:
          NODE_LINK: ${{ secrets.PROXY_URL }}
        run: |
          if [ -n "$NODE_LINK" ]; then
            bash <(wget -qO- https://main.ssss.nyc.mn/setup_proxy.sh)
            sleep 5
            if curl -x "socks5://127.0.0.1:1080" --max-time 5 -s https://api.ipify.org > /dev/null 2>&1; then
              echo "IS_PROXY=true" >> $GITHUB_ENV
            fi
          fi

      - name: 运行续期脚本
        env:
          PYTHONIOENCODING: utf-8
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          GAME4FREE_RENEW_URL: ${{ secrets.GAME4FREE_RENEW_URL }}
          GAME4FREE_COOKIE: ${{ secrets.GAME4FREE_COOKIE }}
          GAME4FREE_ACCOUNTS: ${{ secrets.GAME4FREE_ACCOUNTS }}
          GAME4FREE_ACCOUNT: ${{ secrets.GAME4FREE_ACCOUNT }}
          SB_SKIP_DRIVER_UPDATE: "true"
          CHROME_BIN: /opt/hostedtoolcache/bin/google-chrome
        working-directory: gaming4free-renew
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python renew.py

      - name: 上传调试截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: gaming4free-renew/debug_output/
          if-no-files-found: warn
          retention-days: 3
