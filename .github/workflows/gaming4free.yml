name: gaming4free renew (WARP + Python)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
  schedule:
    # 每 2 小时跑一次（错峰避开整点拥堵）
    # gaming4free 上限 48h，2h 一次足够保险
    - cron: "13 */2 * * *"

# 同一时刻只允许一个续期任务跑
concurrency:
  group: gaming4free-renew
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      # =========================
      # 🟡 1. 安装官方 WARP 客户端（纯 SOCKS5 模式）
      # =========================
      - name: Setup Official WARP Proxy
        run: |
          # 导入 Cloudflare 官方源
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
            | sudo gpg --yes --dearmor \
            --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ jammy main" \
            | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update
          sudo apt-get install -y cloudflare-warp

          # 注册并设置为纯代理模式（默认 40000 端口）
          warp-cli --accept-tos registration new || true
          warp-cli --accept-tos mode proxy
          warp-cli --accept-tos connect

          echo "⏳ 等待 WARP 隧道建立 ..."
          for i in {1..30}; do
            IP=$(curl -s -x socks5://127.0.0.1:40000 https://api.ipify.org || echo "")
            if [ -n "$IP" ]; then
              echo "✅ WARP ready after ${i}s, exit IP: $IP"
              echo "WARP_IP=$IP" >> $GITHUB_ENV
              break
            fi
            sleep 1
          done
          if [ -z "$IP" ]; then
            echo "❌ WARP 启动失败"
            exit 1
          fi

      # =========================
      # 🟡 2. 安装系统依赖（Xvfb + 音频解码）
      # =========================
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg libglib2.0-0 libnss3 libnspr4 \
                                 libdbus-1-3 libatk1.0-0 libatk-bridge2.0-0 \
                                 libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
                                 libxdamage1 libxfixes3 libxrandr2 libgbm1 \
                                 libpango-1.0-0 libcairo2 libasound2

      # =========================
      # 🟡 3. Python 环境
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          sbase install chromium

      # =========================
      # 🟡 4. 运行续期脚本
      # =========================
      - name: Run renew script
        env:
          MC_USERNAME:  ${{ secrets.MC_USERNAME }}
          MC_PASSWORD:  ${{ secrets.MC_PASSWORD }}
          GF_SITE_URL:  ${{ secrets.GF_SITE_URL }}
          GF_LOGIN_URL: ${{ secrets.GF_LOGIN_URL }}
          GF_COOKIE:    ${{ secrets.GF_COOKIE }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:   ${{ secrets.TG_CHAT_ID }}
        run: |
          mkdir -p screenshots
          xvfb-run -a --server-args="-screen 0 1280x800x24" python renew.py

      # =========================
      # 🟡 5. 上传截图 + 日志（失败也上传）
      # =========================
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-${{ github.run_id }}
          path: screenshots/**
          if-no-files-found: warn
          retention-days: 7

      - name: Upload log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: renew-log-${{ github.run_id }}
          path: renew.log
          if-no-files-found: warn
          retention-days: 7
